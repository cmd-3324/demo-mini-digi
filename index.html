<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo E-Commerce Checkout</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="checkout-container">
        <div class="checkout-form-section">
            <h2>Checkout Details</h2>
            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Demo: Form submitted successfully!');">
                
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="address">Shipping Address</label>
                    <input type="text" id="address" placeholder="123 Main St, Apt 4B" required>
                </div>

                <div class="form-row">
                    <div class="form-group col-6">
                        <label for="city">City</label>
                        <input type="text" id="city" placeholder="New York" required>
                    </div>
                    <div class="form-group col-6">
                        <label for="zip">Postal Code</label>
                        <input type="text" id="zip" placeholder="10001" required>
                    </div>
                </div>

                <hr>

                <h3>Payment Method</h3>
                <div class="form-group">
                    <label for="card-name">Name on Card</label>
                    <input type="text" id="card-name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="card-number">Card Number</label>
                    <input type="text" id="card-number" placeholder="1234 5678 9101 1121" required>
                </div>

                <div class="form-row">
                    <div class="form-group col-6">
                        <label for="card-expiry">Expiry Date</label>
                        <input type="text" id="card-expiry" placeholder="MM/YY" required>
                    </div>
                    <div class="form-group col-6">
                        <label for="card-cvv">CVV</label>
                        <input type="text" id="card-cvv" placeholder="123" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Place Demo Order</button>
            </form>
        </div>

        <div class="order-summary-section">
            <h3>Order Summary</h3>
            
            <div class="summary-item">
                <div class="item-details">
                    <span class="item-name">Wireless Headphones</span>
                    <span class="item-qty">Qty: 1</span>
                </div>
                <span class="item-price">$99.00</span>
            </div>

            <div class="summary-item">
                <div class="item-details">
                    <span class="item-name">Mechanical Keyboard</span>
                    <span class="item-qty">Qty: 1</span>
                </div>
                <span class="item-price">$120.00</span>
            </div>

            <hr>

            <div class="totals">
                <div class="total-row">
                    <span>Subtotal</span>
                    <span>$219.00</span>
                </div>
                <div class="total-row">
                    <span>Shipping</span>
                    <span class="free-shipping">FREE</span>
                </div>
                <hr>
                <div class="total-row final-total">
                    <span>Total</span>
                    <span>$219.00</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
